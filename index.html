<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Notion向けのグレースケールSpotifyウィジェット">
  <title>Cloud Radio</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="widget-shell" aria-labelledby="widget-title">
    <div class="sky-layer" aria-hidden="true"></div>
    <div class="plaid-layer" aria-hidden="true"></div>
    <div class="mist-layer" aria-hidden="true"></div>

    <section class="widget-card">
      <header class="widget-header">
        <div>
          <p class="eyebrow" id="widget-kicker">NOTION AUDIO</p>
          <h1 id="widget-title">CLOUD RADIO</h1>
          <p class="subtitle" id="widget-subtitle">quiet frequencies for a cloudy room</p>
        </div>

        <div class="weather-mark" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </header>

      <div class="divider" aria-hidden="true"></div>

      <section class="player-frame" aria-label="Spotify player">
        <iframe
          id="spotify-player"
          title="Spotify Embed"
          width="100%"
          height="352"
          frameborder="0"
          allowfullscreen
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>

        <div class="setup-message" id="setup-message" hidden>
          <strong>Spotify URLを設定してください</strong>
          <span><code>config.js</code> の <code>spotifyUrl</code> を変更します。</span>
        </div>
      </section>

      <footer class="widget-footer">
        <span id="footer-label">OVERCAST SESSION</span>
        <span aria-hidden="true">◌</span>
        <span>GRAY SCALE / 01</span>
      </footer>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
