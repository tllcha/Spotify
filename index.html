<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Notion向けグレースケールSpotifyウィジェット">
  <title>Cloud Radio</title>

  <!-- config.js だけは外部設定として残す。v4を付けて古いキャッシュを避ける。 -->
  <script src="./config.js?v=4"></script>

  <style>
    :root {
      --ink-strong: #272b2d;
      --ink: #4b5154;
      --ink-soft: #747c80;
      --paper: rgba(235, 239, 240, 0.82);
      --line: rgba(48, 54, 57, 0.18);
      --shadow: rgba(26, 30, 32, 0.20);
      --radius-outer: 22px;
      --radius-inner: 14px;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 0;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink-strong);
      background: #aeb4b7;
    }

    .widget-shell {
      position: relative;
      isolation: isolate;
      display: grid;
      width: 100%;
      height: 100dvh;
      min-height: 0;
      place-items: center;
      padding: clamp(6px, 2vw, 18px);
      overflow: hidden;
      background: #aeb4b7;
    }

    .sky-layer,
    .plaid-layer,
    .mist-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sky-layer {
      z-index: -4;
      background:
        linear-gradient(rgba(36, 40, 42, 0.10), rgba(36, 40, 42, 0.16)),
        url("./assets/cloudy-sky-gray.webp") center 42% / cover no-repeat;
      transform: scale(1.035);
    }

    .plaid-layer {
      z-index: -3;
      background: url("./assets/plaid-gray.webp") center / cover no-repeat;
      mix-blend-mode: soft-light;
      opacity: 0.25;
    }

    .mist-layer {
      z-index: -2;
      background:
        radial-gradient(circle at 72% 12%, rgba(255, 255, 255, 0.42), transparent 35%),
        linear-gradient(120deg, rgba(255, 255, 255, 0.10), transparent 42%, rgba(30, 34, 36, 0.08));
    }

    .widget-card {
      width: min(820px, 100%);
      max-height: 100%;
      padding: clamp(10px, 2.2vw, 22px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: var(--radius-outer);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.28), transparent 55%),
        var(--paper);
      box-shadow:
        0 18px 52px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(14px) saturate(0.45);
      -webkit-backdrop-filter: blur(14px) saturate(0.45);
    }

    .widget-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .eyebrow,
    .widget-footer {
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--ink-soft);
      font-size: 0.62rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.25rem, 5vw, 2.65rem);
      font-weight: 500;
      letter-spacing: 0.045em;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(0.72rem, 1.6vw, 0.96rem);
      font-style: italic;
    }

    .weather-mark {
      display: flex;
      flex: 0 0 auto;
      align-items: flex-end;
      gap: 4px;
      min-width: 38px;
      height: 24px;
      padding-top: 4px;
    }

    .weather-mark span {
      display: block;
      width: 6px;
      border: 1px solid rgba(39, 43, 45, 0.28);
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.26);
    }

    .weather-mark span:nth-child(1) { height: 10px; }
    .weather-mark span:nth-child(2) { height: 21px; }
    .weather-mark span:nth-child(3) { height: 15px; }

    .divider {
      height: 1px;
      margin: 11px 0;
      background: linear-gradient(90deg, transparent, var(--line) 8%, var(--line) 92%, transparent);
    }

    .player-frame {
      position: relative;
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(33, 38, 40, 0.16);
      border-radius: var(--radius-inner);
      background: #303537;
      box-shadow:
        0 10px 28px rgba(23, 27, 29, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.11);
    }

    #spotify-player {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      max-width: none;
      border: 0;
      background: #303537;
      transform-origin: top left;
    }

    html[data-grayscale-player="true"] #spotify-player {
      filter: grayscale(1) saturate(0);
    }

    .setup-message {
      display: grid;
      min-height: 92px;
      place-content: center;
      gap: 7px;
      padding: 18px 14px;
      text-align: center;
      color: #e5e8e9;
    }

    .setup-message strong {
      font-size: 0.92rem;
    }

    .setup-message span {
      color: #b9bfc2;
      font-size: 0.76rem;
    }

    .setup-message code {
      padding: 0.1em 0.35em;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.1);
    }

    .widget-footer {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 9px;
      overflow: hidden;
      color: var(--ink-soft);
      font-size: 0.52rem;
      font-weight: 700;
      white-space: nowrap;
    }

    @media (max-width: 320px) {
      .widget-shell {
        padding: 4px;
      }

      .widget-card {
        padding: 8px;
        border-radius: 16px;
      }

      .eyebrow,
      .subtitle,
      .weather-mark {
        display: none;
      }

      h1 {
        font-size: 1rem;
        letter-spacing: 0.025em;
      }

      .divider {
        margin: 7px 0;
      }

      .player-frame {
        border-radius: 12px;
      }

      .widget-footer {
        margin-top: 6px;
        font-size: 0.42rem;
        letter-spacing: 0.12em;
      }
    }

    @media (max-width: 230px), (max-height: 205px) {
      .widget-header,
      .divider,
      .widget-footer {
        display: none;
      }

      .widget-shell,
      .widget-card {
        padding: 0;
      }

      .widget-card,
      .player-frame {
        border-radius: 12px;
      }

      .widget-card {
        border: 0;
        box-shadow: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="widget-shell" aria-labelledby="widget-title">
    <div class="sky-layer" aria-hidden="true"></div>
    <div class="plaid-layer" aria-hidden="true"></div>
    <div class="mist-layer" aria-hidden="true"></div>

    <section class="widget-card">
      <header class="widget-header">
        <div>
          <p class="eyebrow" id="widget-kicker">NOTION AUDIO</p>
          <h1 id="widget-title">CLOUD RADIO</h1>
          <p class="subtitle" id="widget-subtitle">quiet frequencies for a cloudy room</p>
        </div>

        <div class="weather-mark" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </header>

      <div class="divider" aria-hidden="true"></div>

      <section class="player-frame" id="player-frame" aria-label="Spotify player">
        <iframe
          id="spotify-player"
          title="Spotify Embed"
          width="456"
          height="152"
          frameborder="0"
          allowfullscreen
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="eager"
          scrolling="no"
          referrerpolicy="strict-origin-when-cross-origin"
          hidden
        ></iframe>

        <div class="setup-message" id="setup-message" hidden>
          <strong>Spotify URLを設定してください</strong>
          <span><code>config.js</code> の <code>spotifyUrl</code> を変更します。</span>
        </div>
      </section>

      <footer class="widget-footer">
        <span id="footer-label">OVERCAST SESSION</span>
        <span>GRAY SCALE / 01</span>
      </footer>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const config = window.WIDGET_CONFIG ?? {};
      const root = document.documentElement;
      const frame = document.getElementById("player-frame");
      const player = document.getElementById("spotify-player");
      const setupMessage = document.getElementById("setup-message");

      // Spotify公式oEmbedの推奨寸法。内部をこの幅で描画してから外側だけ縮小する。
      const EMBED_WIDTH = 456;
      const EMBED_HEIGHT = 152;

      const setText = (id, value) => {
        const element = document.getElementById(id);

        if (element && typeof value === "string" && value.trim()) {
          element.textContent = value.trim();
        }
      };

      const toEmbedUrl = (input) => {
        if (typeof input !== "string" || !input.trim()) {
          return null;
        }

        const value = input.trim();
        const allowedTypes = new Set([
          "track",
          "album",
          "playlist",
          "artist",
          "show",
          "episode"
        ]);

        if (value.startsWith("spotify:")) {
          const [, type, id] = value.split(":");

          if (allowedTypes.has(type) && id) {
            return `https://open.spotify.com/embed/${type}/${encodeURIComponent(id)}?utm_source=generator&theme=0`;
          }

          return null;
        }

        try {
          const url = new URL(value);

          if (url.hostname !== "open.spotify.com") {
            return null;
          }

          const parts = url.pathname.split("/").filter(Boolean);
          const offset = parts[0] === "embed" ? 1 : 0;
          const type = parts[offset];
          const id = parts[offset + 1];

          if (!allowedTypes.has(type) || !id) {
            return null;
          }

          return `https://open.spotify.com/embed/${type}/${encodeURIComponent(id)}?utm_source=generator&theme=0`;
        } catch {
          return null;
        }
      };

      const fitPlayer = () => {
        const availableWidth = Math.max(1, frame.clientWidth);
        const scale = Math.min(1, availableWidth / EMBED_WIDTH);

        player.style.width = `${EMBED_WIDTH}px`;
        player.style.height = `${EMBED_HEIGHT}px`;
        player.width = String(EMBED_WIDTH);
        player.height = String(EMBED_HEIGHT);
        player.style.transform = `scale(${scale})`;

        // transformはレイアウト寸法を変えないため、外枠の高さだけ縮尺に合わせる。
        frame.style.height = `${Math.ceil(EMBED_HEIGHT * scale)}px`;
      };

      setText("widget-title", config.title);
      setText("widget-subtitle", config.subtitle);
      setText("widget-kicker", config.kicker);
      setText("footer-label", config.footerLabel);

      root.dataset.grayscalePlayer =
        config.grayscalePlayer === false ? "false" : "true";

      const embedUrl = toEmbedUrl(config.spotifyUrl);

      if (!embedUrl) {
        player.hidden = true;
        setupMessage.hidden = false;
        frame.style.height = "auto";
        return;
      }

      // 案内とプレイヤーは必ず排他的にする。
      setupMessage.remove();
      player.hidden = false;
      player.src = embedUrl;

      fitPlayer();

      if ("ResizeObserver" in window) {
        const observer = new ResizeObserver(fitPlayer);
        observer.observe(frame);
      } else {
        window.addEventListener("resize", fitPlayer, { passive: true });
      }
    })();
  </script>
</body>
</html>
